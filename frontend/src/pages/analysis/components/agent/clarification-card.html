<div v-if="agentClarificationQuestion" class="agent-message-row is-assistant">
    <div class="agent-clarification-card">
        <div class="agent-clarification-title">{{ agentClarificationQuestion }}</div>
        <div
            v-for="(option, index) in getAgentClarificationOptions()"
            :key="`agent-clarify-option-${index}`"
            class="agent-clarification-row">
            <div class="agent-clarification-index">{{ index + 1 }}.</div>
            <button
                type="button"
                class="agent-clarification-option"
                :disabled="agentLoading || agentClarificationSubmitting"
                @click="onAgentClarificationOptionClick(option)">
                {{ option }}
            </button>
        </div>
        <div class="agent-clarification-row is-input">
            <div
                class="agent-clarification-index"
                :class="{ 'is-empty': !hasAgentClarificationOptions() }"
                :aria-hidden="!hasAgentClarificationOptions() ? 'true' : 'false'">{{ getAgentClarificationInputIndexLabel() }}</div>
            <div class="agent-clarification-input-wrap">
                <input
                    v-model="agentClarificationDraft"
                    type="text"
                    class="agent-clarification-input"
                    placeholder="输入更具体的问题"
                    :disabled="agentLoading || agentClarificationSubmitting || agentSessionHydrating"
                    @keydown.enter.prevent="onAgentClarificationDraftSubmit()">
                <button
                    type="button"
                    class="agent-clarification-submit"
                    :disabled="!canSubmitAgentClarificationDraft()"
                    @click="onAgentClarificationDraftSubmit()">
                    发送
                </button>
            </div>
        </div>
    </div>
</div>
