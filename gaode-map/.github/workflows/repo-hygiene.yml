name: repo-hygiene

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run repo hygiene checks
        run: bash scripts/check_repo_hygiene.sh
