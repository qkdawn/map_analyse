<div v-if="(agentThinkingExpanded || agentLoading) && getAgentVisibleReasoningBlocks().length" class="agent-reasoning-panel">
    <div
        v-for="block in getAgentVisibleReasoningBlocks()"
        :key="`agent-reasoning-${block.id}`"
        class="agent-reasoning-block"
        :class="`is-${block.state || 'active'}`">
        <div class="agent-reasoning-title">{{ block.title || '模型思考' }}</div>
        <pre
            v-if="block.content"
            class="agent-reasoning-content"
            data-agent-scroll-inner
            @wheel.stop.passive="onAgentInnerScrollIntent"
            @touchmove.stop.passive="onAgentInnerScrollIntent"
            @scroll.passive="onAgentInnerScrollIntent">{{ block.content }}</pre>
        <div v-else class="agent-reasoning-placeholder">等待模型输出思考过程...</div>
    </div>
</div>
